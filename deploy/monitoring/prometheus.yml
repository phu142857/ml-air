global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts/mlair-alerts.yml

scrape_configs:
  - job_name: "mlair-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: "mlair-scheduler"
    static_configs:
      - targets: ["scheduler:9102"]

  - job_name: "mlair-executor"
    static_configs:
      - targets: ["executor:9103"]
