services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ml-air-frontend
    ports:
      - "38080:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: ml-air-api
    environment:
      ML_AIR_REDIS_URL: redis://redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://mlair:mlair@postgres:5432/mlair
      ML_AIR_JWT_HS256_SECRET: mlair-dev-jwt-secret-32bytes-minimum-key
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  scheduler:
    build:
      context: ../scheduler
      dockerfile: Dockerfile
    container_name: ml-air-scheduler
    environment:
      ML_AIR_REDIS_URL: redis://redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://mlair:mlair@postgres:5432/mlair
      ML_AIR_SCHEDULER_METRICS_PORT: 9102
    ports:
      - "9102:9102"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  executor:
    build:
      context: ../executor
      dockerfile: Dockerfile
    container_name: ml-air-executor
    environment:
      ML_AIR_REDIS_URL: redis://redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://mlair:mlair@postgres:5432/mlair
      ML_AIR_EXECUTOR_METRICS_PORT: 9103
    ports:
      - "9103:9103"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ml-air-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ml-air-postgres
    environment:
      POSTGRES_USER: mlair
      POSTGRES_PASSWORD: mlair
      POSTGRES_DB: mlair
    ports:
      - "5432:5432"
    volumes:
      - ml_air_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ml-air-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ml_air_minio:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ml-air-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    ports:
      - "39090:9090"
    depends_on:
      - api
      - scheduler
      - executor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ml-air-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "33000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ml_air_pgdata:
  ml_air_minio:
