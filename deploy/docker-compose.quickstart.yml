services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ml-air-frontend
    ports:
      - "${ML_AIR_FRONTEND_PORT:-38080}:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: ml-air-api
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@postgres:5432/mlair}
      ML_AIR_JWT_HS256_SECRET: ${ML_AIR_JWT_HS256_SECRET:-mlair-dev-jwt-secret-32bytes-minimum-key}
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-maintainer-token}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEY: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEY:-}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEY: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEY:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON:-}
    ports:
      - "${ML_AIR_API_PORT:-8080}:8080"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  scheduler:
    build:
      context: ../scheduler
      dockerfile: Dockerfile
    container_name: ml-air-scheduler
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@postgres:5432/mlair}
      ML_AIR_SCHEDULER_METRICS_PORT: ${ML_AIR_SCHEDULER_METRICS_PORT:-9102}
      ML_AIR_REPLAY_REQUIRE_ARTIFACT_EVIDENCE: ${ML_AIR_REPLAY_REQUIRE_ARTIFACT_EVIDENCE:-1}
      ML_AIR_REPLAY_REQUIRE_CHECKSUM: ${ML_AIR_REPLAY_REQUIRE_CHECKSUM:-0}
      ML_AIR_REPLAY_REQUIRE_SIGNED_MANIFEST: ${ML_AIR_REPLAY_REQUIRE_SIGNED_MANIFEST:-0}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEY: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEY:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON:-}
    ports:
      - "${ML_AIR_SCHEDULER_METRICS_PORT:-9102}:9102"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  executor:
    build:
      context: ../executor
      dockerfile: Dockerfile
    container_name: ml-air-executor
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@postgres:5432/mlair}
      ML_AIR_EXECUTOR_METRICS_PORT: ${ML_AIR_EXECUTOR_METRICS_PORT:-9103}
      ML_AIR_API_BASE_URL: ${ML_AIR_API_BASE_URL:-http://api:8080}
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-maintainer-token}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEY: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEY:-}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON:-}
    ports:
      - "${ML_AIR_EXECUTOR_METRICS_PORT:-9103}:9103"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ml-air-redis
    ports:
      - "${ML_AIR_REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ml-air-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlair}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlair}
      POSTGRES_DB: ${POSTGRES_DB:-mlair}
    ports:
      - "${ML_AIR_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ml_air_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ml-air-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
    ports:
      - "${ML_AIR_MINIO_API_PORT:-9000}:9000"
      - "${ML_AIR_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ml_air_minio:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ml-air-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    ports:
      - "${ML_AIR_PROMETHEUS_PORT:-39090}:9090"
    depends_on:
      - api
      - scheduler
      - executor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ml-air-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "${GF_USERS_ALLOW_SIGN_UP:-false}"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${ML_AIR_GRAFANA_PORT:-33000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ml_air_pgdata:
  ml_air_minio:
