apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ml-air-minio
spec:
  serviceName: ml-air-minio
  replicas: 1
  selector:
    matchLabels:
      app: ml-air-minio
  template:
    metadata:
      labels:
        app: ml-air-minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.auth.rootPassword | quote }}
          ports:
            - containerPort: {{ .Values.minio.servicePort }}
            - containerPort: {{ .Values.minio.consolePort }}
          volumeMounts:
            - name: miniodata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: miniodata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.minio.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: ml-air-minio
spec:
  selector:
    app: ml-air-minio
  ports:
    - name: api
      port: {{ .Values.minio.servicePort }}
      targetPort: {{ .Values.minio.servicePort }}
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: {{ .Values.minio.consolePort }}
