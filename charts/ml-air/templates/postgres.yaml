apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ml-air-postgres
spec:
  serviceName: ml-air-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ml-air-postgres
  template:
    metadata:
      labels:
        app: ml-air-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
          ports:
            - containerPort: {{ .Values.postgres.servicePort }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: ml-air-postgres
spec:
  selector:
    app: ml-air-postgres
  ports:
    - port: {{ .Values.postgres.servicePort }}
      targetPort: {{ .Values.postgres.servicePort }}
