name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quickstart-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare env
        run: cp .env.example .env

      - name: Preflight doctor
        run: make doctor

      - name: Boot quickstart stack
        run: make rebuild

      - name: Verify quickstart health
        run: make health

      - name: Teardown stack
        if: always()
        run: make down

  env-sync-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate env sync (.env.example vs compose refs)
        run: python scripts/check_env_sync.py

  manifest-key-rotation-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest key rotation policy file
        run: python scripts/check_manifest_key_rotation.py --file deploy/security/manifest-keys.sample.json --algorithm hmac-sha256

  deploy-config-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config safety
        run: python scripts/check_deploy_config.py

  api-python-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Syntax check
        run: |
          python -m compileall api/app scheduler executor

  helm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint chart
        run: helm lint charts/ml-air

      - name: Render chart
        run: helm template ml-air charts/ml-air >/tmp/ml-air-chart.out

  docker-build-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
          - name: scheduler
            context: ./scheduler
          - name: executor
            context: ./executor
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ml-air/${{ matrix.name }}:ci
